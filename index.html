<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日作息</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
:root{--bg:#0e0d0b;--surface:#161410;--card:#1c1a16;--border:#2e2a22;--border2:#3d3830;--gold:#c9a84c;--gold2:#e8c97a;--muted:#7a7060;--muted2:#9a9080;--text:#e8dcc8;--text2:#c4b89a;--green:#6b9e6b;--green2:#8abe8a;--red:#c46060;--blue:#6080c4;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Serif TC',serif;background:var(--bg);color:var(--text);min-height:100vh;}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 60% 40% at 20% 10%,rgba(201,168,76,0.06) 0%,transparent 60%),radial-gradient(ellipse 50% 60% at 80% 80%,rgba(212,129,42,0.04) 0%,transparent 60%);}
.app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:32px 24px;}
/* Login screen */
.login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;text-align:center;}
.login-screen h1{font-family:'Cormorant Garamond',serif;font-size:3rem;font-weight:300;color:var(--gold2);margin-bottom:8px;}
.login-screen .sub{font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--muted);letter-spacing:0.14em;text-transform:uppercase;margin-bottom:48px;}
.btn-google{display:flex;align-items:center;gap:12px;padding:14px 28px;background:white;border:none;border-radius:6px;font-size:1rem;font-weight:500;color:#333;cursor:pointer;transition:all 0.2s;box-shadow:0 2px 12px rgba(0,0,0,0.3);}
.btn-google:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,0.4);}
.btn-google img{width:22px;height:22px;}
.login-note{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted);margin-top:20px;line-height:1.8;}
/* Main app */
.main-app{display:none;}
.header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.hl h1{font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:300;color:var(--gold2);letter-spacing:0.04em;line-height:1;margin-bottom:4px;}
.hl .sub{font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--muted);letter-spacing:0.12em;text-transform:uppercase;}
.hr{text-align:right;display:flex;flex-direction:column;align-items:flex-end;}
#dateDisplay{font-family:'DM Mono',monospace;font-size:0.95rem;color:var(--gold);}
#dayBadge{display:inline-block;margin-top:4px;padding:4px 12px;border:1px solid var(--border2);border-radius:2px;font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--muted2);}
.user-info{display:flex;align-items:center;gap:10px;margin-top:10px;justify-content:flex-end;flex-wrap:wrap;}
.user-avatar{width:38px;height:38px;border-radius:50%;border:2px solid var(--border2);}
.user-name{font-family:'Noto Serif TC',serif;font-size:0.9rem;color:var(--text2);}
.btn-logout{background:none;border:1px solid var(--border2);border-radius:2px;color:var(--muted);font-family:'DM Mono',monospace;font-size:0.68rem;padding:4px 10px;cursor:pointer;transition:all 0.15s;}
.btn-logout:hover{color:var(--red);border-color:var(--red);}
.tab-nav{display:flex;gap:2px;margin-bottom:24px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:4px;}
.tab-btn{flex:1;padding:10px 8px;background:transparent;border:none;border-radius:2px;font-family:'Noto Serif TC',serif;font-size:0.95rem;color:var(--muted2);cursor:pointer;transition:all 0.2s;}
.tab-btn.active{background:#221f19;color:var(--gold2);border:1px solid var(--border2);}
.tab-btn:hover:not(.active){color:var(--text2);}
.tab-panel{display:none;}.tab-panel.active{display:block;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:680px){
.grid{grid-template-columns:1fr;}
.header{flex-direction:column;align-items:flex-start;gap:10px;}
.hr{align-items:flex-start;}
.user-info{justify-content:flex-start;}
.app{padding:20px 16px;}
.tab-btn{font-size:0.85rem;padding:9px 4px;}
}
.card{background:var(--card);border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.card-header{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;}
.card-icon{font-size:1.1rem;}.card-title{font-family:'DM Mono',monospace;font-size:0.82rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--gold);}
.card-body{padding:14px 18px 16px;}
.pw{height:3px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:6px;}
.pb{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:2px;transition:width 0.4s ease;}
.plabel{font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted);text-align:right;margin-bottom:14px;}
.ci{display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px dashed var(--border);}
.ci:last-child{border-bottom:none;}
.cb{width:20px;height:20px;border-radius:3px;border:1px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;transition:all 0.18s;}
.cb.checked{background:var(--green);border-color:var(--green);}
.cb.checked::after{content:'\2713';font-size:0.78rem;color:white;font-weight:bold;}
.clabel{flex:1;font-size:1rem;color:var(--text2);outline:none;line-height:1.4;padding:2px 4px;border-radius:3px;}
.clabel.done{color:var(--muted);text-decoration:line-through;text-decoration-color:var(--muted);}
.clabel:focus{background:rgba(201,168,76,0.06);color:var(--text);}
.dbtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1rem;padding:0 4px;flex-shrink:0;opacity:0;transition:opacity 0.15s,color 0.15s;}
.ci:hover .dbtn{opacity:1;}.dbtn:hover{color:var(--red)!important;}
.clock-btn{background:none;border:1px solid var(--border2);border-radius:2px;color:var(--muted);cursor:pointer;font-size:0.68rem;padding:2px 6px;flex-shrink:0;font-family:'DM Mono',monospace;transition:all 0.15s;opacity:0;}
.clock-btn.has-remind{color:var(--blue);border-color:rgba(96,128,196,0.4);background:rgba(96,128,196,0.1);opacity:1;}
.ci:hover .clock-btn{opacity:1;}
.clock-btn:hover{color:var(--gold);border-color:var(--gold);}
.btn-add{width:100%;margin-top:12px;padding:10px;background:transparent;border:1px dashed var(--border2);border-radius:3px;color:var(--muted2);font-family:'DM Mono',monospace;font-size:0.82rem;cursor:pointer;transition:all 0.2s;}
.btn-add:hover{border-color:var(--gold);color:var(--gold);background:rgba(201,168,76,0.04);}
.opct{font-family:'Cormorant Garamond',serif;font-size:4rem;font-weight:600;color:var(--gold2);line-height:1;text-align:center;margin:10px 0 6px;}
.osub{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--muted);text-align:center;letter-spacing:0.12em;margin-bottom:18px;}
.ocnt{font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--muted);display:flex;justify-content:space-between;margin-top:6px;}
.sync-status{font-family:'DM Mono',monospace;font-size:0.65rem;color:var(--muted);text-align:center;margin-bottom:16px;letter-spacing:0.08em;}
.sync-status.syncing{color:var(--gold);}
.sync-status.synced{color:var(--green2);}
.hday{border:1px solid var(--border);border-radius:4px;margin-bottom:10px;overflow:hidden;}
.hhdr{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;background:var(--surface);cursor:pointer;}
.hhdr:hover{background:#1a1814;}.hhdr.today{background:rgba(201,168,76,0.07);}
.hdate{font-family:'DM Mono',monospace;font-size:0.85rem;color:var(--text2);display:flex;align-items:center;gap:10px;}
.ttag{font-size:0.6rem;color:var(--gold);border:1px solid var(--gold);padding:1px 6px;border-radius:2px;}
.hright{font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--muted);display:flex;align-items:center;gap:14px;}
.hpct{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:600;}
.hpct.full{color:var(--green2);}.hpct.partial{color:var(--gold2);}.hpct.low{color:var(--red);}
.hdetail{display:none;padding:12px 16px;border-top:1px solid var(--border);}
.hsec{font-family:'DM Mono',monospace;font-size:0.65rem;text-transform:uppercase;letter-spacing:0.14em;color:var(--muted);margin:10px 0 6px;}
.hsec:first-child{margin-top:0;}.hitem{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:0.9rem;}
.loading{text-align:center;padding:40px;font-family:'DM Mono',monospace;font-size:0.82rem;color:var(--muted);}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:100;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border2);border-radius:8px;padding:24px;width:360px;max-width:92vw;}
.modal h3{font-family:'Cormorant Garamond',serif;font-size:1.4rem;font-weight:300;color:var(--gold2);margin-bottom:16px;}
.mfield{margin-bottom:14px;}
.mlabel{font-family:'DM Mono',monospace;font-size:0.68rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--muted);margin-bottom:6px;}
.minput{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:3px;padding:9px 12px;font-family:'DM Mono',monospace;font-size:0.9rem;color:var(--text);outline:none;}
.minput:focus{border-color:var(--gold);}
.modal-btns{display:flex;gap:8px;margin-top:18px;}
.btn-m-save{flex:1;padding:10px;background:rgba(201,168,76,0.15);border:1px solid var(--gold);border-radius:3px;color:var(--gold2);font-family:'DM Mono',monospace;font-size:0.82rem;cursor:pointer;}
.btn-m-cancel{padding:10px 14px;background:transparent;border:1px solid var(--border2);border-radius:3px;color:var(--muted2);font-family:'DM Mono',monospace;font-size:0.82rem;cursor:pointer;}
.btn-m-del{padding:10px 12px;background:transparent;border:1px solid rgba(196,96,96,0.3);border-radius:3px;color:var(--red);font-family:'DM Mono',monospace;font-size:0.78rem;cursor:pointer;}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>
<div class="app">

  <!-- Login Screen -->
  <div class="login-screen" id="loginScreen">
    <h1>每日作息</h1>
    <div class="sub">Daily Routine Tracker</div>
    <button class="btn-google" onclick="signInGoogle()">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
      使用 Google 帳號登入
    </button>
    <div class="login-note">
      登入後資料會自動同步到雲端<br>
      手機、電腦都能看到同樣的紀錄
    </div>
  </div>

  <!-- Main App -->
  <div class="main-app" id="mainApp">
    <div class="header">
      <div class="hl"><h1>每日作息</h1><div class="sub">Daily Routine Tracker</div></div>
      <div class="hr">
        <div id="dateDisplay"></div>
        <div id="dayBadge"></div>
        <div class="user-info">
          <img class="user-avatar" id="userAvatar" src="" alt="">
          <span class="user-name" id="userName"></span>
          <button class="btn-logout" onclick="signOut()">登出</button>
        </div>
      </div>
    </div>

    <div class="sync-status" id="syncStatus">&#9729; 同步中...</div>

    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('today',this)">&#128203; 今日作息</button>
      <button class="tab-btn" onclick="switchTab('remind',this)">&#9201; 提醒</button>
      <button class="tab-btn" onclick="switchTab('history',this)">&#128197; 歷史紀錄</button>
    </div>

    <div class="tab-panel active" id="tab-today">
      <div class="grid">
        <div class="card">
          <div class="card-header"><span class="card-icon">&#127749;</span><span class="card-title">早晨例行</span></div>
          <div class="card-body"><div class="pw"><div class="pb" id="bar-morning" style="width:0%"></div></div><div class="plabel" id="lbl-morning">0 / 0 已完成</div><div id="list-morning"></div><button class="btn-add" onclick="addItem('morning')">＋ 新增項目</button></div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-icon">&#9728;&#65039;</span><span class="card-title">中午</span></div>
          <div class="card-body"><div class="pw"><div class="pb" id="bar-work" style="width:0%"></div></div><div class="plabel" id="lbl-work">0 / 0 已完成</div><div id="list-work"></div><button class="btn-add" onclick="addItem('work')">＋ 新增項目</button></div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-icon">&#127769;</span><span class="card-title">下班後</span></div>
          <div class="card-body"><div class="pw"><div class="pb" id="bar-evening" style="width:0%"></div></div><div class="plabel" id="lbl-evening">0 / 0 已完成</div><div id="list-evening"></div><button class="btn-add" onclick="addItem('evening')">＋ 新增項目</button></div>
        </div>
        <div class="card">
          <div class="card-header"><span class="card-icon">&#128200;</span><span class="card-title">今日總進度</span></div>
          <div class="card-body"><div class="opct" id="overall-pct">0%</div><div class="osub">TODAY'S COMPLETION</div><div class="pw" style="height:6px;"><div class="pb" id="bar-overall" style="width:0%"></div></div><div class="ocnt"><span id="cnt-done">0 項完成</span><span id="cnt-total">共 0 項</span></div></div>
        </div>
      </div>
    </div>

    <div class="tab-panel" id="tab-remind">
      <div class="card">
        <div class="card-header"><span class="card-icon">&#9201;</span><span class="card-title">推播提醒設定</span></div>
        <div class="card-body">
          <div id="notif-status" style="font-family:'DM Mono',monospace;font-size:0.8rem;color:var(--muted);margin-bottom:16px;"></div>
          <button id="btn-enable-notif" onclick="enableNotifications()" style="width:100%;padding:12px;background:rgba(201,168,76,0.12);border:1px solid var(--gold);border-radius:4px;color:var(--gold2);font-family:'DM Mono',monospace;font-size:0.85rem;cursor:pointer;margin-bottom:20px;">&#128276; 開啟推播通知</button>
          <div style="font-family:'DM Mono',monospace;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.12em;color:var(--gold);margin-bottom:12px;">已設定的提醒</div>
          <div id="remind-list"></div>
          <div style="font-family:'DM Mono',monospace;font-size:0.72rem;color:var(--muted);margin-top:16px;line-height:1.8;">
            &#128161; 在今日作息頁面，點擊各項目旁的時鐘圖示來設定提醒時間。<br>
            &#9888;&#65039; 推播需要在瀏覽器允許通知權限。
          </div>
        </div>
      </div>
    </div>
    <div class="tab-panel" id="tab-history"><div id="hist-container"></div></div>
  </div>
</div>

<!-- Remind Modal -->
<div class="overlay" id="remind-modal">
  <div class="modal">
    <h3>&#9201; 設定提醒</h3>
    <div style="font-family:'DM Mono',monospace;font-size:0.78rem;color:var(--muted2);margin-bottom:16px;" id="modal-item-name"></div>
    <div class="mfield">
      <div class="mlabel">提醒時間</div>
      <input class="minput" id="m-time" type="time">
    </div>
    <div class="modal-btns">
      <button class="btn-m-cancel" onclick="closeRemindModal()">取消</button>
      <button class="btn-m-del" id="btn-del-remind" onclick="deleteRemind()" style="display:none;">移除</button>
      <button class="btn-m-save" onclick="saveRemind()">儲存</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
import { getMessaging, getToken, onMessage } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js';

const firebaseConfig = {
  apiKey: "AIzaSyCpWPdSTy4f2Vw9vFbDgcZ93kPnJ2HBXPc",
  authDomain: "daily-routine-5e94d.firebaseapp.com",
  projectId: "daily-routine-5e94d",
  storageBucket: "daily-routine-5e94d.firebasestorage.app",
  messagingSenderId: "693519205169",
  appId: "1:693519205169:web:ace2042942fbf086a86610"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const messaging = getMessaging(app);
const provider = new GoogleAuthProvider();
const VAPID_KEY = 'BAGglhejaYXX_yUpH7c2PXKIoyxtFAzs6b10RXZNwP2FwY_H7fRnNnIe9septHtU9UdnIN-3b2ch4M3q1f_cpR8';

var now = new Date();
var dow = now.getDay();
var dayNames=['\u65e5','\u4e00','\u4e8c','\u4e09','\u56db','\u4e94','\u516d'];
var isWeekend=(dow===0||dow===6);
var TODAY = now.getFullYear()+'-'+(now.getMonth()+1)+'-'+now.getDate();
var SECS=['morning','work','evening'];
var SEC_NAMES={morning:'\u65e9\u6668\u4f8b\u884c',work:'\u4e2d\u5348',evening:'\u4e0b\u73ed\u5f8c'};
var DEFAULT_ITEMS={
  morning:['\u8d77\u5e8a','\u76e5\u6d17','\u91cf\u9ad4\u91cd','\u770b\u6295\u8cc7\u65b0\u805e','\u51fa\u9580\u4e0a\u73ed'],
  work:['\u5230\u516c\u53f8\u88dd\u6c34','\u5348\u9910\uff08\u4e00\u4efd\u9910\u9ede\uff0b\u8c46\u6f3f\uff0c150\u5143\u5167\uff09','\u9b5a\u6cb9','\u7dad\u4ed6\u547d C','\u8c37\u80f1\u7518\u80bd'],
  evening:['\u4fdd\u990a\u76ae\u819a']
};

var currentUser = null;
var userData = { items: {}, done: {} };

document.getElementById('dateDisplay').textContent=now.getFullYear()+' \u5e74 '+(now.getMonth()+1)+' \u6708 '+now.getDate()+' \u65e5';
document.getElementById('dayBadge').textContent='\u661f\u671f'+dayNames[dow];

window.signInGoogle = function() {
  signInWithPopup(auth, provider).catch(function(e){ alert('\u767b\u5165\u5931\u6557\uff1a'+e.message); });
};

window.signOut = function() {
  fbSignOut(auth);
};

onAuthStateChanged(auth, function(user) {
  if (user) {
    currentUser = user;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    document.getElementById('userAvatar').src = user.photoURL || '';
    document.getElementById('userName').textContent = user.displayName || user.email;
    loadUserData();
  } else {
    currentUser = null;
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
  }
});

function setSyncStatus(status) {
  var el = document.getElementById('syncStatus');
  if (status === 'syncing') { el.textContent = '\u2601\ufe0f \u540c\u6b65\u4e2d...'; el.className = 'sync-status syncing'; }
  else if (status === 'synced') { el.textContent = '\u2714 \u5df2\u540c\u6b65'; el.className = 'sync-status synced'; }
  else { el.textContent = ''; el.className = 'sync-status'; }
}

async function loadUserData() {
  if (!currentUser) return;
  setSyncStatus('syncing');
  try {
    var uid = currentUser.uid;
    var itemsDoc = await getDoc(doc(db, 'users', uid, 'data', 'items'));
    var doneDoc = await getDoc(doc(db, 'users', uid, 'done', TODAY));

    if (itemsDoc.exists()) {
      userData.items = itemsDoc.data();
      var ok = true;
      SECS.forEach(function(s){ if(!userData.items[s]||userData.items[s].length===0) ok=false; });
      if (!ok) { SECS.forEach(function(s){ if(!userData.items[s]||userData.items[s].length===0) userData.items[s]=DEFAULT_ITEMS[s].slice(); }); }
    } else {
      userData.items = {};
      SECS.forEach(function(s){ userData.items[s] = DEFAULT_ITEMS[s].slice(); });
      await setDoc(doc(db,'users',uid,'data','items'), userData.items);
    }

    userData.done = doneDoc.exists() ? doneDoc.data() : {};
    // Pre-load reminds cache
    await loadReminds();
    setSyncStatus('synced');
    SECS.forEach(function(s){ render(s); });
    updateOverall();
    scheduleLocalReminders();
    document.getElementById('remind-modal').addEventListener('click', function(e){ if(e.target===this) closeRemindModal(); });
  } catch(e) {
    setSyncStatus('');
    console.error(e);
  }
}

async function saveItems() {
  if (!currentUser) return;
  setSyncStatus('syncing');
  try {
    await setDoc(doc(db,'users',currentUser.uid,'data','items'), userData.items);
    setSyncStatus('synced');
  } catch(e) { setSyncStatus(''); }
}

async function saveDone() {
  if (!currentUser) return;
  setSyncStatus('syncing');
  try {
    await setDoc(doc(db,'users',currentUser.uid,'done',TODAY), userData.done);
    if (!isWeekend) await saveSnap();
    setSyncStatus('synced');
  } catch(e) { setSyncStatus(''); }
}

async function saveSnap() {
  if (!currentUser) return;
  var snap = {};
  SECS.forEach(function(s){
    snap[s] = (userData.items[s]||[]).map(function(lbl,i){
      return {label:lbl, done:!!(userData.done[s]&&userData.done[s][i])};
    });
  });
  await setDoc(doc(db,'users',currentUser.uid,'history',TODAY), snap);
}

function render(sec) {
  var container = document.getElementById('list-'+sec);
  container.innerHTML = '';
  var list = userData.items[sec] || [];
  list.forEach(function(lbl, i) {
    var isDone = !!(userData.done[sec] && userData.done[sec][i]);
    var row = document.createElement('div'); row.className = 'ci';
    var box = document.createElement('div'); box.className = 'cb'+(isDone?' checked':'');
    box.addEventListener('click', (function(idx){ return function(){
      if (!userData.done[sec]) userData.done[sec] = {};
      userData.done[sec][idx] = !userData.done[sec][idx];
      saveDone(); render(sec); updateOverall();
    };})(i));
    var lb = document.createElement('div'); lb.className = 'clabel'+(isDone?' done':'');
    lb.contentEditable = true; lb.spellcheck = false; lb.textContent = lbl;
    lb.addEventListener('blur', (function(idx){ return function(){
      userData.items[sec][idx] = lb.textContent.trim() || '\u672a\u547d\u540d';
      saveItems(); render(sec);
    };})(i));
    lb.addEventListener('keydown', function(e){ if(e.key==='Enter'){e.preventDefault();lb.blur();} });
    lb.addEventListener('click', function(e){ e.stopPropagation(); });
    var reminds = _remindsCache || {}; var rKey = sec+'_'+i; var hasRemind = !!reminds[rKey];
    var clock = document.createElement('button');
    clock.className = 'clock-btn' + (hasRemind ? ' has-remind' : '');
    clock.textContent = hasRemind ? (reminds[rKey]?reminds[rKey].time:'\u23f0') : '\u23f0';
    clock.title = '\u8a2d\u5b9a\u63d0\u9192';
    clock.addEventListener('click', (function(idx, n){ return function(e){ e.stopPropagation(); openRemindModal(sec, idx, n); };})(i, list[i]));

    var del = document.createElement('button'); del.className = 'dbtn'; del.textContent = '\u00d7';
    del.addEventListener('click', (function(idx){ return function(){
      userData.items[sec].splice(idx,1);
      if (userData.done[sec]) {
        var nd={};
        Object.keys(userData.done[sec]).forEach(function(k){var ki=parseInt(k);if(ki<idx)nd[k]=userData.done[sec][k];else if(ki>idx)nd[ki-1]=userData.done[sec][k];});
        userData.done[sec]=nd;
      }
      saveItems(); saveDone(); render(sec); updateOverall();
    };})(i));
    row.appendChild(box); row.appendChild(lb); row.appendChild(clock); row.appendChild(del);
    container.appendChild(row);
  });
  updateSection(sec);
}

function updateSection(sec) {
  var list = userData.items[sec]||[]; var total=list.length; var dc=0;
  list.forEach(function(l,i){ if(userData.done[sec]&&userData.done[sec][i])dc++; });
  var pct=total>0?Math.round(dc/total*100):0;
  document.getElementById('bar-'+sec).style.width=pct+'%';
  var lbl=document.getElementById('lbl-'+sec);
  lbl.textContent=dc+' / '+total+' \u5df2\u5b8c\u6210';
  lbl.style.color=(dc===total&&total>0)?'var(--green2)':'var(--muted)';
}

function updateOverall() {
  var total=0,dc=0;
  SECS.forEach(function(s){
    var list=userData.items[s]||[];total+=list.length;
    list.forEach(function(l,i){if(userData.done[s]&&userData.done[s][i])dc++;});
  });
  var pct=total>0?Math.round(dc/total*100):0;
  document.getElementById('bar-overall').style.width=pct+'%';
  document.getElementById('overall-pct').textContent=pct+'%';
  document.getElementById('cnt-done').textContent=dc+' \u9805\u5b8c\u6210';
  document.getElementById('cnt-total').textContent='\u5171 '+total+' \u9805';
}

window.addItem = async function(sec) {
  if (!userData.items[sec]) userData.items[sec]=[];
  userData.items[sec].push('\u65b0\u9805\u76ee');
  await saveItems();
  render(sec); updateOverall();
  var labels=document.querySelectorAll('#list-'+sec+' .clabel');
  if(labels.length){var last=labels[labels.length-1];last.focus();try{var r=document.createRange();r.selectNodeContents(last);window.getSelection().removeAllRanges();window.getSelection().addRange(r);}catch(e){}}
};

window.switchTab = function(tab, btn) {
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.getElementById('tab-'+tab).classList.add('active'); btn.classList.add('active');
  if(tab==='history') renderHistory();
  if(tab==='remind') renderRemindList().catch(function(){});
};

async function renderHistory() {
  var container = document.getElementById('hist-container');
  container.innerHTML = '<div class="loading">\u8f09\u5165\u4e2d...</div>';
  if (!currentUser) return;
  try {
    var snap = await getDocs(collection(db,'users',currentUser.uid,'history'));
    var dates = [];
    snap.forEach(function(d){ var dt=new Date(d.id); if(dt.getDay()!==0&&dt.getDay()!==6) dates.push({id:d.id,data:d.data()}); });
    dates.sort(function(a,b){return new Date(b.id)-new Date(a.id);});
    if(dates.length===0){container.innerHTML='<div style="font-family:\'DM Mono\',monospace;font-size:0.86rem;color:var(--muted);padding:40px 0;text-align:center;">\u5c1a\u7121\u7d00\u9304</div>';return;}
    container.innerHTML='';
    dates.forEach(function(entry){
      var ds=entry.id; var snap2=entry.data; var d=new Date(ds);
      var isToday=(ds===TODAY);
      var dl=d.getFullYear()+'\u5e74'+(d.getMonth()+1)+'\u6708'+d.getDate()+'\u65e5\uff08'+dayNames[d.getDay()]+'\uff09';
      var td=0,ta=0;
      SECS.forEach(function(s){if(!snap2[s])return;td+=snap2[s].filter(function(x){return x.done;}).length;ta+=snap2[s].length;});
      var pct=ta>0?Math.round(td/ta*100):0;var pc=pct===100?'full':pct>=50?'partial':'low';
      var block=document.createElement('div');block.className='hday';
      var hdr=document.createElement('div');hdr.className='hhdr'+(isToday?' today':'');
      hdr.innerHTML='<div class="hdate"><span>'+dl+'</span>'+(isToday?'<span class="ttag">TODAY</span>':'')+'</div><div class="hright"><span>'+td+' / '+ta+'</span><span class="hpct '+pc+'">'+pct+'%</span></div>';
      var detail=document.createElement('div');detail.className='hdetail';
      SECS.forEach(function(s){
        if(!snap2[s]||snap2[s].length===0)return;
        var t=document.createElement('div');t.className='hsec';t.textContent=SEC_NAMES[s];detail.appendChild(t);
        snap2[s].forEach(function(item){var row=document.createElement('div');row.className='hitem';row.innerHTML=item.done?'<span style="color:var(--green2);font-size:0.8rem;">&#10003;</span><span style="color:var(--muted2);text-decoration:line-through;">'+item.label+'</span>':'<span style="color:var(--red);font-size:0.8rem;opacity:0.7;">&#10005;</span><span style="color:var(--text2);">'+item.label+'</span>';detail.appendChild(row);});
      });
      hdr.addEventListener('click',function(){detail.style.display=detail.style.display==='block'?'none':'block';});
      block.appendChild(hdr);block.appendChild(detail);container.appendChild(block);
    });
  } catch(e) { container.innerHTML='<div class="loading">\u8f09\u5165\u5931\u6557</div>'; }
}

// ── Remind functions ─────────────────────────────
var _remindsCache = null;

async function loadReminds() {
  if (_remindsCache) return _remindsCache;
  if (!currentUser) return {};
  try {
    var snap = await getDoc(doc(db,'users',currentUser.uid,'data','reminds'));
    _remindsCache = snap.exists() ? snap.data() : {};
    return _remindsCache;
  } catch(e) { return {}; }
}

async function saveRemindsToCloud(r) {
  _remindsCache = r;
  if (!currentUser) return;
  try {
    await setDoc(doc(db,'users',currentUser.uid,'data','reminds'), r);
  } catch(e) { console.error('save reminds error', e); }
}

var remindTimers = [];
async function scheduleLocalReminders() {
  remindTimers.forEach(function(t){ clearTimeout(t); });
  remindTimers = [];
  var reminds = await loadReminds();
  Object.keys(reminds).forEach(function(k) {
    var r = reminds[k];
    var parts = r.time.split(':');
    var target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), parseInt(parts[0]), parseInt(parts[1]), 0);
    var diff = target.getTime() - Date.now();
    if (diff > 0) {
      var t = setTimeout(function() {
        if (Notification.permission === 'granted') {
          new Notification('\u63d0\u9192\uff1a'+r.name, { body: r.name+'\u8a72\u5b8c\u6210\u56c9\uff01' });
        }
      }, diff);
      remindTimers.push(t);
    }
  });
}

var _remindSec = '', _remindIdx = -1;
window.openRemindModal = async function(sec, idx, name) {
  _remindSec = sec; _remindIdx = idx;
  document.getElementById('modal-item-name').textContent = SEC_NAMES[sec]+' \u203a '+name;
  var reminds = await loadReminds(); var key = sec+'_'+idx; var ex = reminds[key];
  document.getElementById('m-time').value = ex ? ex.time : '08:00';
  document.getElementById('btn-del-remind').style.display = ex ? 'block' : 'none';
  document.getElementById('remind-modal').classList.add('open');
};
window.closeRemindModal = function() { document.getElementById('remind-modal').classList.remove('open'); };
window.saveRemind = async function() {
  var t = document.getElementById('m-time').value;
  if (!t) { alert('\u8acb\u8f38\u5165\u6642\u9593'); return; }
  var reminds = await loadReminds();
  var name = (userData.items[_remindSec]||[])[_remindIdx] || '';
  reminds[_remindSec+'_'+_remindIdx] = { time: t, name: name, sec: _remindSec, idx: _remindIdx };
  await saveRemindsToCloud(reminds);
  closeRemindModal(); SECS.forEach(function(s){ render(s); }); await renderRemindList(); scheduleLocalReminders();
};
window.deleteRemind = async function() {
  var reminds = await loadReminds(); delete reminds[_remindSec+'_'+_remindIdx];
  await saveRemindsToCloud(reminds); closeRemindModal(); SECS.forEach(function(s){ render(s); }); await renderRemindList(); scheduleLocalReminders();
};
window.enableNotifications = async function() {
  try {
    var perm = await Notification.requestPermission();
    if (perm !== 'granted') { alert('\u8acb\u5141\u8a31\u901a\u77e5\u6b0a\u9650'); return; }
    if ('serviceWorker' in navigator) {
      await navigator.serviceWorker.register('/a/firebase-messaging-sw.js');
    }
    try {
      var token = await getToken(messaging, { vapidKey: VAPID_KEY });
      if (currentUser && token) {
        await setDoc(doc(db,'users',currentUser.uid,'tokens',token), { token: token, ts: Date.now() });
      }
    } catch(e) { console.log('FCM token error:', e); }
    document.getElementById('notif-status').innerHTML = '<span style="color:var(--green2);">\u2714 \u63a8\u64ad\u5df2\u958b\u555f\uff01</span>';
    document.getElementById('btn-enable-notif').style.display = 'none';
  } catch(e) {
    document.getElementById('notif-status').innerHTML = '<span style="color:var(--red);">\u958b\u555f\u5931\u6557\uff1a'+e.message+'</span>';
  }
};
async function renderRemindList() {
  var container = document.getElementById('remind-list');
  if (!container) return;
  var reminds = await loadReminds(); var keys = Object.keys(reminds);
  if (keys.length === 0) {
    container.innerHTML = '<div style="font-family:\'DM Mono\',monospace;font-size:0.8rem;color:var(--muted);">\u5c1a\u672a\u8a2d\u5b9a\u2014\u5230\u4eca\u65e5\u4f5c\u606f\u9801\u9ede\u64ca\u9805\u76ee\u65c1\u7684\u6642\u9418\u5716\u793a</div>';
    return;
  }
  container.innerHTML = '';
  keys.forEach(function(k) {
    var r = reminds[k];
    var row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--border);';
    row.innerHTML = '<div><div style="font-size:0.9rem;color:var(--text2);">'+SEC_NAMES[r.sec]+' \u203a '+r.name+'</div><div style="font-family:\'DM Mono\',monospace;font-size:0.72rem;color:var(--blue);margin-top:2px;">\u23f0 '+r.time+'</div></div>';
    var del = document.createElement('button');
    del.textContent = '\u79fb\u9664';
    del.style.cssText = 'background:none;border:1px solid rgba(196,96,96,0.3);border-radius:2px;color:var(--red);font-family:\'DM Mono\',monospace;font-size:0.7rem;padding:3px 8px;cursor:pointer;';
    del.addEventListener('click', (function(rk, rs){ return async function(){
      var rn = await loadReminds(); delete rn[rk]; await saveRemindsToCloud(rn);
      SECS.forEach(function(s){ render(s); }); await renderRemindList(); scheduleLocalReminders();
    };})(k, r.sec));
    row.appendChild(del); container.appendChild(row);
  });
}

document.getElementById('remind-modal').addEventListener('click', function(e){ if(e.target===this) closeRemindModal(); });
scheduleLocalReminders();

</script>
